<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Validator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Đăng ký tài khoản</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Họ và Tên (2-50 ký tự)</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Nhập họ và tên">
                    <span class="icon" id="name-icon"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="text" id="email" placeholder="example@gmail.com">
                <div class="error" id="email-error"></div>
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="phone" placeholder="0901-234-567">
                <div class="error" id="phone-error"></div>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <div class="strength-meter">
                    <div class="bar" id="str-bar"></div>
                </div>
                <div class="strength-text" id="str-text"></div>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu">
                <div class="error" id="confirm-error"></div>
            </div>

            <button type="submit" id="submit-btn" disabled>Đăng ký</button>
        </form>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Đăng ký thành công! 🎉</h3>
            <pre id="user-info"></pre>
            <button id="close-btn">Đóng</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
