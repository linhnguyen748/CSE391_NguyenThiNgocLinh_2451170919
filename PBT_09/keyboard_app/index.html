<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>A11y Keyboard App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Image Gallery</h1>
        <p aria-live="polite">Mẹo: Nhấn <kbd>Ctrl</kbd> + <kbd>K</kbd> để mở Command Palette</p>
    </header>

    <main>
        <div class="gallery" aria-label="Khu vực xem ảnh. Dùng mũi tên trái/phải, số 1-9 hoặc dấu cách để điều khiển" tabindex="0">
            <img id="main-img" src="https://placehold.co/600x400?text=Image+1" alt="Ảnh số 1 trong bộ sưu tập" aria-live="polite">
            
            <div class="controls">
                <button id="prev-btn" aria-label="Ảnh trước đó (Phím mũi tên trái)">◀ Prev</button>
                <button id="play-btn" aria-label="Phát hoặc tạm dừng trình chiếu (Phím Space)">▶ Play</button>
                <button id="next-btn" aria-label="Ảnh tiếp theo (Phím mũi tên phải)">Next ▶</button>
            </div>
            
            <p id="img-indicator" aria-live="polite">1 / 9</p>
        </div>
    </main>

    <dialog id="cmd-palette" aria-label="Bảng lệnh (Command Palette)">
        <input type="text" id="cmd-input" aria-label="Tìm kiếm lệnh" placeholder="Gõ lệnh tìm kiếm...">
        <ul id="cmd-list" role="listbox" aria-label="Danh sách các lệnh"></ul>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
