<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations & Transitions</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="container">
        <h2>4. Loading Spinner</h2>
        <!-- Spinner Element -->
        <div class="spinner"></div>

        <hr>

        <h2>1, 2, 3, 5. Card, Image Zoom, Button Hover & Fade In</h2>
        <!-- Card với class fade-in (hiệu ứng 5) -->
        <div class="card fade-in">
            <!-- Container ảnh có overflow: hidden (hiệu ứng 3) -->
            <div class="img-container">
                <img src="https://via.placeholder.com/300x200" alt="Sản phẩm Demo">
            </div>
            
            <div class="card-body">
                <h3>Giày Thể Thao Sneaker</h3>
                <p>Giá: 850.000đ</p>
                <!-- Nút Mua ngay (hiệu ứng 2) -->
                <button class="btn">Mua ngay</button>
            </div>
        </div>
    </div>

</body>
</html>
