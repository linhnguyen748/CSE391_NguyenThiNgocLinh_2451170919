<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Debug CSS Layout</title>

</head>
<body>

    <h1>Cách 1: Sử dụng border-box</h1>

        <div class="sidebar">Sidebar (300px)</div>

    </div>

</body>
