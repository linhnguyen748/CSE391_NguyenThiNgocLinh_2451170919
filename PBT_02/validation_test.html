<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra Validation HTML5</title>
    <style>
        form { margin: 20px; line-height: 2.5; }
        label { display: inline-block; width: 150px; }
    </style>
</head>
<body>
    <h2>Test Validation Attributes</h2>
    <form>
        <label>TH1 (Required):</label>
        <input type="text" required value=""><br>

        <label>TH2 (Email):</label>
        <input type="email" value="abc"><br>

        <label>TH3 (Number):</label>
        <input type="number" min="1" max="10" value="15"><br>

        <label>TH4 (Pattern):</label>
        <input type="text" pattern="[0-9]{10}" value="abc123"><br>

        <label>TH5 (Minlength):</label>
        <input type="password" minlength="8" value="123"><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
