<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Tài khoản E-Commerce</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 600px; margin: 20px auto; padding: 10px; }
        fieldset { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        legend { font-weight: bold; padding: 0 10px; }
        div { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], 
        input[type="password"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .radio-group label { display: inline; font-weight: normal; margin-right: 15px; }
        .checkbox-group label { display: inline; font-weight: normal; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; }
        button[type="submit"] { background-color: #28a745; color: white; }
        button[type="reset"] { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <h1>Đăng ký tài khoản mới</h1>

    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <div>
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" required 
                       minlength="2" maxlength="50" placeholder="Nhập họ và tên của bạn">
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required 
                       placeholder="example@gmail.com">
            </div>

            <div>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" 
                       pattern="[0-9]{10}" placeholder="0987654321">
                <small>(Yêu cầu đúng 10 chữ số)</small>
            </div>

            <div>
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" max="2026-05-10">
            </div>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" 
                       pattern="^[A-Za-z0-9_]{3,20}$" 
                       placeholder="Chữ cái, số, underscore (3-20 ký tự)">
            </div>

            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required 
                       minlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$"
                       placeholder="Tối thiểu 8 ký tự, 1 hoa, 1 số">
            </div>

            <div>
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required 
                       minlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$"
                       placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <div>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">-- Chọn Thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="cantho">Cần Thơ</option>
                    <option value="haiphong">Hải Phòng</option>
                </select>
            </div>

            <div>
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district">
                    <option value="">-- Chọn Quận/Huyện --</option>
                    <option value="q1">Quận 1</option>
                    <option value="q2">Quận 2</option>
                    <option value="q3">Quận 3</option>
                </select>
            </div>

            <div>
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" 
                          placeholder="Số nhà, tên đường..."></textarea>
            </div>

            <div class="radio-group">
                <label>Giới tính:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Nam</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Nữ</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Khác</label>
            </div>
        </fieldset>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">Tôi đồng ý với điều khoản sử dụng</label>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit">Đăng ký ngay</button>
            <button type="reset">Nhập lại</button>
        </div>

    </form>
</body>
</html>
