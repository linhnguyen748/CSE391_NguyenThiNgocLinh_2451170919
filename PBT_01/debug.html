<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopTLU - Cửa hàng trực tuyến</title>
</head>
<body>
    
    <header>
        <h1>Welcome to ShopTLU</h1>
        <nav aria-label="Menu chính">
            <ul>
                <li><a href="home.html">Trang chủ</a></li>
                <li><a href="products.html">Sản phẩm</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="hot-products">
            <h2>Sản phẩm hot</h2>
            <article>
                <figure>
                    <img src="iphone.jpg" alt="iPhone 16 Pro màu Titan" width="200">
                    <figcaption>iPhone 16 Pro</figcaption>
                </figure>
                <p>Giá: <strong>25.990.000đ</strong></p>
            </article>
        </section>
        
        <section id="info">
            <h2>Thông tin chi tiết</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th scope="col">Tên sản phẩm</th>
                        <th scope="col">Giá niêm yết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>iPhone 16 Pro</td>
                        <td>25.990.000đ</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    
    <aside>
        <h3>Tin tức mới</h3>
        <p>Sidebar content - Chương trình khuyến mãi tháng 5.</p>
    </aside>
    
    <footer>
        <p>&copy; 2026 ShopTLU. Tất cả quyền được bảo lưu.</p>
    </footer>

</body>
</html>
